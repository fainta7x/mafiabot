<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mafia Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { color: white; background: #212121; text-align: center; font-family: sans-serif; }
        button { padding: 10px 20px; background: #0088cc; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Управление игрой</h1>
    <p id="user_name">Загрузка...</p>

    <button id="close_btn">Закрыть</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById("user_name").innerText =
                "Привет, " + tg.initDataUnsafe.user.first_name;
        } else {
            document.getElementById("user_name").innerText = "Привет, игрок!";
        }

        document.getElementById("close_btn").addEventListener("click", () => {
            tg.close();
        });
    </script>
</body>
</html>
