<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mafia Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { color: white; background: #212121; text-align: center; font-family: sans-serif; }
        h1 { margin-top: 20px; }
        p { margin: 10px 0 20px; }
        .btn {
            padding: 10px 20px;
            margin: 5px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
        }
        #close_btn {
            background: #555;
        }
    </style>
</head>
<body>
    <h1>Управление игрой</h1>
    <p id="user_name">Загрузка...</p>

    <!-- Кнопки действий -->
    <div>
        <button class="btn" id="btn_start">▶️ Начать игру</button>
        <button class="btn" id="btn_night">🌙 Ночь</button>
        <button class="btn" id="btn_day">☀️ День</button>
    </div>

    <div>
        <button class="btn" id="close_btn">Закрыть</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Показываем имя пользователя
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById("user_name").innerText =
                "Привет, " + tg.initDataUnsafe.user.first_name;
        } else {
            document.getElementById("user_name").innerText = "Привет, игрок!";
        }

        // Утилита: безопасная отправка данных боту
        function sendAction(action) {
            const payload = { action: action };  // простой JSON: { "action": "start" }
            tg.sendData(JSON.stringify(payload));
        }

        // Кнопки действий
        document.getElementById("btn_start").addEventListener("click", () => {
            sendAction("start");
        });

        document.getElementById("btn_night").addEventListener("click", () => {
            sendAction("night");
        });

        document.getElementById("btn_day").addEventListener("click", () => {
            sendAction("day");
        });

        // Закрытие WebApp по кнопке
        document.getElementById("close_btn").addEventListener("click", () => {
            tg.close();
        });
    </script>
</body>
</html>
